<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Ramon Marcolino">
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="HTML elements" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a>href="https://www.byui.edu">BYU Idaho</a></li>
            <li><a>href="https://www.churchofjesuschrist.org/?lang=eng">LDS</a></li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure</h1>

        <section>
            <h2>Heading 1</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Vel, eveniet!</p>
        </section>

        <section>
            <h2>Heading 2</h2>
            <p>Lorem ipsum dolor sit amet.</p>
        </section>

        <asize>
            <img
              src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/recife-brazil/1200x1920/recife-brazil-mormon-temple-907592-wallpaper.jpg"
              width="200">
        </asize>

        <footer>
            <p>Ramon Marcolino</p>
        </footer>
    </main>

</body>

</html>
